version: 1
network_policies:
  flowstate:
    name: flowstate
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: auth.anthropic.com
        port: 443
      - host: platform.claude.com
        port: 443
      - host: statsig.anthropic.com
        port: 443
      - host: sentry.io
        port: 443
      - host: host.docker.internal
        port: 9090
        allowed_ips:
          - "192.168.65.0/24"
          - "172.16.0.0/12"
    binaries:
      - path: /usr/bin/node
      - path: /usr/local/bin/node
      - path: /usr/local/bin/claude
      - path: /usr/bin/curl
      - path: /usr/bin/python3
