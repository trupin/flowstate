<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 2 192 62">
  <!-- Wordmark — centered above the wave -->
  <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="-1" fill="#132a1e">flow<tspan fill="#16a34a">state</tspan></text>

  <!-- Sine wave, deep green left -->
  <path d="M14,46 C28,34 42,34 56,46 C70,58 84,58 98,46" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round"/>
  <!-- Dark slate right -->
  <path d="M98,46 C112,34 126,34 140,46 C154,58 168,58 182,46" stroke="#132a1e" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Entry node -->
  <circle cx="14" cy="46" r="5" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.8"/>
  <circle cx="14" cy="46" r="2" fill="#16a34a" opacity="0.9"/>

  <!-- Green node -->
  <circle cx="56" cy="46" r="3" fill="#16a34a" opacity="0.55"/>

  <!-- Mid node -->
  <circle cx="98" cy="46" r="3.5" fill="#16a34a" opacity="0.45"/>

  <!-- Dark node -->
  <circle cx="140" cy="46" r="3" fill="#132a1e" opacity="0.45"/>

  <!-- Exit node -->
  <circle cx="182" cy="46" r="5" fill="none" stroke="#132a1e" stroke-width="2" opacity="0.55"/>
  <circle cx="182" cy="46" r="3" fill="#132a1e" opacity="0.6"/>
</svg>
