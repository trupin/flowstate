<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select a Flowstate project directory</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --surface: #242424;
        --surface-hover: #2f2f2f;
        --border: #333;
        --text: #e6e6e6;
        --text-muted: #888;
        --accent: #4a90e2;
        --accent-hover: #5ba0f2;
        --highlight: #2d5a2d;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        font-size: 13px;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      button {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        background: var(--surface-hover);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      button.primary:hover {
        background: var(--accent-hover);
      }
      #breadcrumbs {
        flex: 1;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 6px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      #list {
        flex: 1;
        overflow: auto;
        padding: 4px 0;
      }
      .entry {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        cursor: pointer;
        border-left: 3px solid transparent;
      }
      .entry:hover {
        background: var(--surface-hover);
      }
      .entry.selected {
        background: var(--surface-hover);
        border-left-color: var(--accent);
      }
      .entry.has-toml {
        background: rgba(45, 90, 45, 0.18);
      }
      .entry.has-toml.selected {
        background: rgba(45, 90, 45, 0.32);
      }
      .icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .badge {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent);
        background: rgba(74, 144, 226, 0.15);
        padding: 2px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 10px 12px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }
      #error {
        padding: 10px 12px;
        color: #ff8888;
        font-size: 12px;
        display: none;
      }
      #error.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <button id="up" title="Parent directory">↑</button>
      <button id="home" title="Home">~</button>
      <div id="breadcrumbs">/</div>
    </header>
    <div id="error"></div>
    <div id="list"></div>
    <footer>
      <button id="cancel">Cancel</button>
      <button id="select" class="primary" disabled>Select Folder</button>
    </footer>
    <script>
      const { invoke } = window.__TAURI__.core;

      const initialPath = __INITIAL_PATH__;
      let currentPath = initialPath;
      let parentPath = null;
      let entries = [];
      let selectedIndex = -1;

      const $list = document.getElementById("list");
      const $crumbs = document.getElementById("breadcrumbs");
      const $up = document.getElementById("up");
      const $home = document.getElementById("home");
      const $cancel = document.getElementById("cancel");
      const $select = document.getElementById("select");
      const $error = document.getElementById("error");

      function showError(msg) {
        $error.textContent = msg;
        $error.classList.add("visible");
      }
      function clearError() {
        $error.classList.remove("visible");
        $error.textContent = "";
      }

      async function navigate(path) {
        try {
          clearError();
          const listing = await invoke("picker_list_directory", { path });
          currentPath = listing.path;
          parentPath = listing.parent;
          entries = listing.entries;
          selectedIndex = -1;
          render();
        } catch (e) {
          showError(String(e));
        }
      }

      function render() {
        $crumbs.textContent = currentPath;
        $up.disabled = !parentPath;
        $select.disabled = false; // current directory is always selectable
        $select.textContent = `Select "${basename(currentPath)}"`;

        $list.innerHTML = "";
        if (entries.length === 0) {
          const empty = document.createElement("div");
          empty.className = "entry";
          empty.style.color = "var(--text-muted)";
          empty.textContent = "(no subdirectories)";
          $list.appendChild(empty);
          return;
        }
        entries.forEach((entry, idx) => {
          const el = document.createElement("div");
          el.className = "entry";
          if (entry.has_flowstate_toml) el.classList.add("has-toml");
          if (idx === selectedIndex) el.classList.add("selected");
          el.innerHTML = `
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <path d="M2 4a1 1 0 0 1 1-1h3.5l1.5 1.5H13a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4z" fill="#9aa0a6"/>
            </svg>
            <span class="name"></span>
            ${entry.has_flowstate_toml ? '<span class="badge">flow</span>' : ""}
          `;
          el.querySelector(".name").textContent = entry.name;
          el.addEventListener("click", () => {
            selectedIndex = idx;
            render();
          });
          el.addEventListener("dblclick", () => {
            navigate(entry.path);
          });
          $list.appendChild(el);
        });
      }

      function basename(path) {
        const parts = path.split("/").filter(Boolean);
        return parts[parts.length - 1] || "/";
      }

      $up.addEventListener("click", () => {
        if (parentPath) navigate(parentPath);
      });
      $home.addEventListener("click", async () => {
        // Resolve $HOME by asking for the parent of /Users/X — we just
        // navigate to `~` and let Rust expand it.
        navigate("~");
      });
      $cancel.addEventListener("click", async () => {
        await invoke("picker_submit", { path: null });
      });
      $select.addEventListener("click", async () => {
        // Selected entry takes precedence over "current directory" so
        // users can pick a subfolder via single-click + Select Folder
        // without first navigating into it.
        const path = selectedIndex >= 0 ? entries[selectedIndex].path : currentPath;
        await invoke("picker_submit", { path });
      });

      document.addEventListener("keydown", async (e) => {
        if (e.key === "Escape") {
          await invoke("picker_submit", { path: null });
        } else if (e.key === "Enter") {
          $select.click();
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          selectedIndex = Math.min(entries.length - 1, selectedIndex + 1);
          render();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          selectedIndex = Math.max(0, selectedIndex - 1);
          render();
        } else if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
          e.preventDefault();
          if (e.key === "ArrowRight" && selectedIndex >= 0) {
            navigate(entries[selectedIndex].path);
          } else if (e.key === "ArrowLeft" && parentPath) {
            navigate(parentPath);
          }
        }
      });

      navigate(initialPath);
    </script>
  </body>
</html>
