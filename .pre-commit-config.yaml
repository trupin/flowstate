repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: bash -c 'cd ui && npx prettier --check "src/**/*.{ts,tsx,css}"'
        language: system
        files: ^ui/src/.*\.(ts|tsx|css)$
        pass_filenames: false
      - id: tsc
        name: tsc
        entry: bash -c 'cd ui && npx tsc --noEmit'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
